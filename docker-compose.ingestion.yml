# Optional open-source data plane for OpenGrowth (OSI + MDM).
# Everything here is OPT-IN. The app runs fully without it using the mock/http/
# memory defaults. Start only the services you want:
#   docker compose -f docker-compose.ingestion.yml up -d opensearch searxng
#
# Then point the app at them via .env (see .env.example):
#   OPENGROWTH_EVIDENCE_INDEX=opensearch  OPENSEARCH_URL=http://localhost:9200
#   OPENGROWTH_SERP=searxng               SEARXNG_URL=http://localhost:8080
#   OPENGROWTH_EXTRACTOR=firecrawl        FIRECRAWL_URL=http://localhost:3002
services:
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  searxng:
    image: searxng/searxng:latest
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    ports:
      - "8080:8080"
    # SearXNG needs `formats: [html, json]` enabled in its settings.yml to serve
    # &format=json to the SerpProvider adapter.

  firecrawl:
    image: ghcr.io/firecrawl/firecrawl:latest
    environment:
      - PORT=3002
    ports:
      - "3002:3002"
    # Firecrawl's own crawl mode is unused — the app only calls /v1/scrape.
    # Some Firecrawl builds require Redis/Playwright side-cars; consult upstream.
